kind = "web"
previewPath = "/"
title = "Fakebook"
version = "1.0.0"
id = "artifacts/fakebook"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22439

[services.development]
run = "pnpm --filter @workspace/fakebook run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fakebook", "run", "build" ]
serve = "static"
publicDir = "artifacts/fakebook/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22439"
BASE_PATH = "/"
