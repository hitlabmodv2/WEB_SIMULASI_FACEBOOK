kind = "web"
previewPath = "/"
title = "Fakebook — Social Simulator"
version = "1.0.0"
id = "artifacts/fakebook"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22439

[services.development]
run = "pnpm --filter @workspace/fakebook run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fakebook", "run", "build" ]
publicDir = "artifacts/fakebook/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22439"
BASE_PATH = "/"
